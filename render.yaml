services:
  - type: web
    name: tw-chip-rebound
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -B -m tw_chip_rebound.mobile_server --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/ping
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: FINMIND_TOKEN
        sync: false
